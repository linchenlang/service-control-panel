<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面板初始配置向导</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Noto Serif SC', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .wizard-container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .wizard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .wizard-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .wizard-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .wizard-body {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        select, input[type="text"], input[type="email"], input[type="number"] {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #ddd;
            border-radius: 0.8rem;
            font-size: 1rem;
            transition: 0.2s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 0.5rem;
        }
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
        }
        .hint {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.3rem;
        }
        .step-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }
        button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        .error {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .success {
            color: #38a169;
            text-align: center;
            padding: 1rem;
        }
        hr {
            margin: 1rem 0;
            border: none;
            border-top: 1px solid #eee;
        }
        @media (max-width: 640px) {
            .wizard-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="wizard-container">
    <div class="wizard-header">
        <h1>🚀 欢迎使用服务管理面板</h1>
        <p>请完成以下基础配置，以获得最佳使用体验</p>
    </div>
    <div class="wizard-body">
        <form id="setupForm">
            <!-- 部署环境 -->
            <div class="form-group">
                <label>部署环境</label>
                <select id="environment" required>
                    <option value="intranet">内网环境（仅内部访问，无公网IP）</option>
                    <option value="internet">公网环境（有公网IP，对外提供服务）</option>
                </select>
                <div class="hint">选择后将影响风险检测策略（如内网环境不会提示防火墙未开启等）。</div>
            </div>

            <!-- 公网IP（内网环境隐藏） -->
            <div class="form-group" id="publicIpGroup">
                <div class="checkbox-group">
                    <input type="checkbox" id="hasPublicIp">
                    <label>服务器拥有公网IP地址</label>
                </div>
            </div>

            <!-- 防火墙状态 -->
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="firewallEnabled" checked>
                    <label>防火墙已开启并正确配置</label>
                </div>
                <div class="hint">建议始终保持防火墙开启，特别是公网环境。</div>
            </div>

            <!-- HTTPS 加密 -->
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="httpsEnabled">
                    <label>已启用HTTPS/SSL加密</label>
                </div>
                <div class="hint">启用后可防止中间人攻击，推荐在生产环境中使用。</div>
            </div>

            <!-- 允许外网访问 -->
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="allowExternal">
                    <label>允许外部网络直接访问服务（需要公网IP或端口转发）</label>
                </div>
            </div>

            <!-- 风险检测间隔 -->
            <div class="form-group">
                <label>风险检测间隔（秒）</label>
                <input type="number" id="riskInterval" value="60" min="30" max="300" step="10">
                <div class="hint">建议60秒以上，过短会消耗系统资源。</div>
            </div>

            <hr>
            <div class="step-buttons">
                <button type="button" class="btn-secondary" onclick="skipSetup()">跳过，稍后配置</button>
                <button type="submit" class="btn-primary">保存配置并进入面板</button>
            </div>
            <div id="message" style="margin-top:1rem; text-align:center;"></div>
        </form>
    </div>
</div>

<script>
    // 根据部署环境动态显示/隐藏公网IP选项
    const envSelect = document.getElementById('environment');
    const publicIpGroup = document.getElementById('publicIpGroup');
    function togglePublicIp() {
        if (envSelect.value === 'intranet') {
            publicIpGroup.style.display = 'none';
            document.getElementById('hasPublicIp').checked = false;
        } else {
            publicIpGroup.style.display = 'block';
        }
    }
    envSelect.addEventListener('change', togglePublicIp);
    togglePublicIp();

    // 处理表单提交
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            environment: envSelect.value,
            has_public_ip: document.getElementById('hasPublicIp').checked,
            firewall_enabled: document.getElementById('firewallEnabled').checked,
            https_enabled: document.getElementById('httpsEnabled').checked,
            allow_external_access: document.getElementById('allowExternal').checked,
            auto_ban_ip: document.getElementById('autoBanIp').checked,
            risk_check_interval: parseInt(document.getElementById('riskInterval').value),
            admin_email: document.getElementById('adminEmail').value,
            notes: document.getElementById('notes').value
        };
        try {
            const response = await fetch('/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.success) {
                document.getElementById('message').innerHTML = '<div class="success">✅ 配置已保存，正在跳转...</div>';
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                document.getElementById('message').innerHTML = '<div class="error">保存失败：' + (result.message || '未知错误') + '</div>';
            }
        } catch (err) {
            document.getElementById('message').innerHTML = '<div class="error">网络错误：' + err.message + '</div>';
        }
    });

    async function skipSetup() {
        // 跳过配置：直接保存默认配置（内网环境，防火墙开启，自动封禁开启）
        const data = {
            environment: 'intranet',
            has_public_ip: false,
            firewall_enabled: true,
            https_enabled: false,
            allow_external_access: false,
            auto_ban_ip: true,
            risk_check_interval: 60,
            admin_email: '',
            notes: '用户跳过配置向导'
        };
        try {
            const response = await fetch('/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = '/';
            } else {
                alert('跳过失败：' + result.message);
            }
        } catch (err) {
            alert('网络错误：' + err.message);
        }
    }
</script>
</body>
</html>
